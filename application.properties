# =====================================================
# ⭐ SERVER CONFIG
# =====================================================
server.port=8081
server.servlet.context-path=/api
spring.application.name=trendaura-backend

# =====================================================
# ⭐ DATABASE CONFIG
# =====================================================
spring.datasource.url=jdbc:mysql://localhost:3306/trendaura?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (Production Safe)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=60000

# =====================================================
# ⭐ JPA / HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Batch Optimization
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =====================================================
# ⭐ SECURITY (JWT)
# =====================================================
jwt.secret=${JWT_SECRET:TrendauraSecureProductionKey123456789}
jwt.expiration-ms=86400000
jwt.refresh-expiration-ms=604800000

# =====================================================
# ⭐ FILE UPLOAD
# =====================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# =====================================================
# ⭐ CLOUDINARY
# =====================================================
cloudinary.cloud-name=dzlx24qek
cloudinary.api-key=362936193545482
cloudinary.api-secret=hWt6L-2siS42vizS6RVXaQukfVA

# =====================================================
# ⭐ CORS
# =====================================================
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5500

# =====================================================
# ⭐ LOGGING (Production Level)
# =====================================================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.springframework.security=INFO

# =====================================================
# ⭐ ACTUATOR (Monitoring Ready)
# =====================================================
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always

# =====================================================
# ⭐ EMAIL / GMAIL CONFIGURATION
# =====================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_EMAIL:trendaura.notifications@gmail.com}
spring.mail.password=${GMAIL_APP_PASSWORD:your-app-password-here}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# =====================================================
# ⭐ CACHE SUPPORT (Future AI + Performance Ready)
# =====================================================
spring.cache.type=redis

# =====================================================
# ⭐ OPENAI CONFIGURATION (AI/ML Features)
# =====================================================
openai.api-key=${OPENAI_API_KEY:sk-xxx-your-key-here}
openai.model=gpt-3.5-turbo
openai.temperature=0.7
openai.max-tokens=500

# =====================================================
# ⭐ FRONTEND URL (For Email Links, CORS, Notifications)
# =====================================================
app.frontend-url=http://localhost:5500

# =====================================================
# ⭐ DEVTOOLS (Disable in Production Deployment)
# =====================================================
spring.devtools.restart.enabled=true
logging.level.root=DEBUG
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always